# SabbathCue dependency audit configuration
# Used by `cargo deny check` in CI

[graph]
targets = ["x86_64-pc-windows-msvc"]

[advisories]
# Surface ALL unmaintained/unsound advisories (including transitive deps) so any
# NEW one fails CI and must be triaged. Knowingly-accepted advisories are listed
# in `ignore` below, each with its dependency source and rationale. Reviewed
# against docs/reports/SECURITY_TEST_REPORT.md §2.7 (R8). Re-evaluate on every Tauri / tokenizers bump.
#
# Scope note: this config checks the x86_64-pc-windows-msvc target only (see [graph]).
# The GTK3-bindings family (atk/gdk/gtk/glib/gtk3-macros, RUSTSEC-2024-04xx) and
# proc-macro-error are Linux-only deps of Tauri's webkit2gtk backend and are therefore
# out of scope here; they will be retired upstream when Tauri/wry move off GTK3.
unmaintained = "all"
unsound = "all"
yanked = "deny"
ignore = [
    # Unmaintained transitive crates pulled in by Tauri (via tauri-utils):
    "RUSTSEC-2025-0057", # fxhash             -> selectors -> kuchikiki -> tauri-utils
    "RUSTSEC-2025-0075", # unic-char-range    -> urlpattern -> tauri-utils
    "RUSTSEC-2025-0080", # unic-common        -> urlpattern -> tauri-utils
    "RUSTSEC-2025-0081", # unic-char-property -> urlpattern -> tauri-utils
    "RUSTSEC-2025-0098", # unic-ucd-version   -> urlpattern -> tauri-utils
    "RUSTSEC-2025-0100", # unic-ucd-ident     -> urlpattern -> tauri-utils
    # Unmaintained transitive crate pulled in by HuggingFace tokenizers (rhema-detection):
    "RUSTSEC-2024-0436", # paste -> tokenizers; proc-macro, build-time only
    # Unsound, but not reachable in our usage:
    "RUSTSEC-2026-0097", # rand: unsound only with a custom logger calling rand::rng(); not our code path
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "Unicode-3.0",
    "ISC",
    "CC0-1.0",
    "BSL-1.0",
    "MPL-2.0",
    "Zlib",
    "0BSD",
    "Unlicense",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"
allow-workspace = true
deny = []
# Every crate WE depend on directly is pinned to a single version. The entries below are
# duplicate *transitive* versions pulled in by upstream crates that have not yet converged
# on a common version. We skip the older line(s) by exact version and keep the newest; any
# bump (a new major, or a patch to one of these pins) makes the skip stop matching, so
# cargo-deny re-reports it for triage. (A `<range` skip would be terser but cargo-deny
# 0.19 only honours a `<` bound when it carries a full x.y.z, so exact pins are used here.)
# Re-evaluate on every Tauri / tokenizers / cpal / keyring bump.
skip = [
    # Tauri's bundled HTML/CSS rewriter (kuchikiki -> selectors/cssparser -> tauri-utils)
    # plus the build-time perfect-hash codegen it runs (phf_generator -> rand -> getrandom).
    { crate = "phf@=0.8.0", reason = "selectors 0.24 (kuchikiki, tauri-utils)" },
    { crate = "phf@=0.10.1", reason = "cssparser 0.29 (kuchikiki, tauri-utils)" },
    { crate = "phf_shared@=0.8.0", reason = "selectors / cssparser (kuchikiki, tauri-utils)" },
    { crate = "phf_shared@=0.10.0", reason = "selectors / cssparser (kuchikiki, tauri-utils)" },
    { crate = "phf_generator@=0.8.0", reason = "selectors / cssparser (kuchikiki, tauri-utils)" },
    { crate = "phf_generator@=0.10.0", reason = "selectors / cssparser (kuchikiki, tauri-utils)" },
    { crate = "phf_macros@=0.10.0", reason = "cssparser (kuchikiki, tauri-utils)" },
    { crate = "phf_codegen@=0.8.0", reason = "selectors (kuchikiki, tauri-utils)" },
    { crate = "siphasher@=0.3.11", reason = "phf_shared 0.8/0.10 (kuchikiki, tauri-utils)" },
    { crate = "rand@=0.7.3", reason = "phf_generator 0.8 build-time hashing (tauri-utils)" },
    { crate = "rand@=0.8.6", reason = "phf_generator 0.10 build-time hashing (tauri-utils)" },
    { crate = "rand_chacha@=0.2.2", reason = "rand 0.7 (phf_generator, tauri-utils)" },
    { crate = "rand_chacha@=0.3.1", reason = "rand 0.8 (phf_generator, tauri-utils)" },
    { crate = "rand_core@=0.5.1", reason = "rand 0.7 (phf_generator, tauri-utils)" },
    { crate = "rand_core@=0.6.4", reason = "rand 0.8 (phf_generator, tauri-utils)" },
    { crate = "getrandom@=0.1.16", reason = "rand_core 0.5 (phf_generator, tauri-utils)" },
    { crate = "getrandom@=0.2.17", reason = "rand_core 0.6 + ring (transitive)" },
    { crate = "getrandom@=0.3.4", reason = "ahash / jobserver / tauri (transitive)" },

    # HuggingFace tokenizers (rhema-detection ONNX embedding path).
    { crate = "base64@=0.13.1", reason = "spm_precompiled -> tokenizers (rhema-detection)" },

    # windows-rs binding generations: cpal / keyring / global-hotkey / Tauri plugins each
    # pin a different major of the windows-sys / windows bindings (newest line kept).
    { crate = "windows-sys@=0.59.0", reason = "global-hotkey / window-vibrancy / winreg (transitive)" },
    { crate = "windows-sys@=0.60.2", reason = "keyring / muda / rfd / tauri-plugin-updater (transitive)" },
    { crate = "windows-targets@=0.52.6", reason = "windows-sys 0.59 (transitive)" },
    { crate = "windows_x86_64_msvc@=0.52.6", reason = "windows-targets 0.52 (transitive)" },
    { crate = "windows-link@=0.1.3", reason = "windows-core 0.61 (windows crate, transitive)" },
    { crate = "windows-result@=0.3.4", reason = "windows-core 0.61 (windows crate, transitive)" },
    { crate = "windows-strings@=0.4.2", reason = "windows-core 0.61 (windows crate, transitive)" },

    # Assorted proc-macro / codegen / collection skew across the build graph.
    { crate = "syn@=1.0.109", reason = "phf_macros / cssparser + legacy proc-macro crates" },
    { crate = "bitflags@=1.3.2", reason = "selectors + png (ico -> tauri-codegen)" },
    { crate = "darling@=0.20.11", reason = "derive_builder_core (transitive build dep)" },
    { crate = "darling_core@=0.20.11", reason = "derive_builder_core (transitive build dep)" },
    { crate = "darling_macro@=0.20.11", reason = "derive_builder_core (transitive build dep)" },
    { crate = "thiserror@=1.0.69", reason = "json-patch (transitive)" },
    { crate = "thiserror-impl@=1.0.69", reason = "json-patch (transitive)" },
    { crate = "indexmap@=1.9.3", reason = "schemars (tauri-utils, transitive)" },
    { crate = "hashbrown@=0.12.3", reason = "indexmap 1 (schemars, transitive)" },
    { crate = "hashbrown@=0.15.5", reason = "hashlink (rusqlite, transitive)" },
    { crate = "foldhash@=0.1.5", reason = "hashbrown 0.15 (transitive)" },
    { crate = "winnow@=0.7.15", reason = "toml 0.9 (tauri-utils build, transitive)" },
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
