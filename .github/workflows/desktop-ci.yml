name: Desktop CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"

jobs:
  frontend:
    name: Frontend checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests + coverage
        run: bun run test:coverage

      - name: Lint
        run: bun run lint

      - name: Duplication check
        run: bunx jscpd

      - name: Build frontend
        run: bun run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: bun run test:e2e
        env:
          CI: "true"

      - name: Bun audit
        run: bun audit --audit-level=moderate

  web-docs:
    name: Web docs build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build web docs
        run: bun run web:build

      - name: Lint web docs
        run: bun run web:lint

  rust:
    name: Rust checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python for Vosk sidecar
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: windows-vs2026

      - name: Clear stale whisper CMake artifacts
        working-directory: src-tauri
        shell: pwsh
        run: |
          if (Test-Path target/debug/build) {
            Get-ChildItem target/debug/build -Directory -Filter 'whisper-rs-sys-*' |
              Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Download Bible source data
        run: bun run download:bible-data

      - name: Build public Bible DB
        run: bun run build:bible:public

      - name: Import EGW books
        run: bun run build:egw

      - name: Verify public Bible DB
        run: bun run verify:bible:public

      - name: Cache Vosk model
        uses: actions/cache@v4
        with:
          path: |
            models/vosk/vosk-model-en-us-0.22-lgraph
            models/vosk/vosk-model-en-us-0.22-lgraph.zip
          key: vosk-model-en-us-0.22-lgraph

      - name: Download Vosk model
        run: bun run download:vosk

      - name: Build self-contained Vosk worker
        run: bun run build:vosk-sidecar

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: models/whisper/ggml-tiny.en.bin
          key: whisper-ggml-tiny-en

      - name: Download Whisper model
        run: bun run download:whisper

      - name: Cache MiniLM model
        uses: actions/cache@v4
        with:
          path: |
            models/minilm-l6-v2
            models/minilm-l6-v2-int8
          key: minilm-l6-v2-model-${{ hashFiles('data/download-model.ts', 'data/export-minilm-onnx.py') }}

      - name: Cache embeddings
        uses: actions/cache@v4
        with:
          path: embeddings
          key: minilm-l6-v2-embeddings-${{ hashFiles('data/download-model.ts', 'data/export-minilm-onnx.py') }}

      - name: Prepare MiniLM semantic assets
        run: |
          bun run download:model
          bun run export:verses
          bun run precompute:embeddings

      - name: Check workspace
        working-directory: src-tauri
        run: cargo check --workspace

      - name: Test workspace
        working-directory: src-tauri
        run: cargo test --workspace

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Install cargo-deny
        shell: pwsh
        run: |
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            cargo +stable install cargo-deny --locked
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }

            if ($attempt -eq 3) {
              exit $LASTEXITCODE
            }

            $delaySeconds = 15 * $attempt
            Write-Warning "cargo-deny install failed on attempt $attempt. Retrying in $delaySeconds seconds."
            Start-Sleep -Seconds $delaySeconds
          }

      - name: Dependency audit
        working-directory: src-tauri
        run: cargo deny check
