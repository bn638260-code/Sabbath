name: Desktop CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test -- --run

      - name: Lint
        run: bun run lint

      - name: Build frontend
        run: bun run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: bun run test:e2e
        env:
          CI: "true"

      - name: npm audit
        run: npm audit --audit-level=moderate

  web-docs:
    name: Web docs build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install

      - name: Install web dependencies
        working-directory: web
        run: bun install

      - name: Build web docs
        run: bun run web:build

      - name: Lint web docs
        run: bun run web:lint

  rust:
    name: Rust checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: windows-vs2026

      - name: Clear stale whisper CMake artifacts
        working-directory: src-tauri
        shell: pwsh
        run: |
          if (Test-Path target/debug/build) {
            Get-ChildItem target/debug/build -Directory -Filter 'whisper-rs-sys-*' |
              Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Install frontend dependencies
        run: bun install

      - name: Download Bible source data
        run: bun run download:bible-data

      - name: Build public Bible DB
        run: bun run build:bible:public

      - name: Import EGW books
        run: bun run build:egw

      - name: Verify public Bible DB
        run: bun run verify:bible:public

      - name: Cache Vosk model
        uses: actions/cache@v4
        with:
          path: |
            models/vosk/vosk-model-small-en-us
            models/vosk/vosk-model-small-en-us-0.15.zip
          key: vosk-model-small-en-us-0.15

      - name: Download Vosk model
        run: bun run download:vosk

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: models/whisper/ggml-tiny.en.bin
          key: whisper-ggml-tiny-en

      - name: Download Whisper model
        run: bun run download:whisper

      - name: Cache MiniLM models
        uses: actions/cache@v4
        with:
          path: |
            models/minilm-l6-v2
            models/minilm-l6-v2-int8
          key: minilm-models-${{ hashFiles('data/export-minilm-onnx.py') }}

      - name: Cache embeddings
        uses: actions/cache@v4
        with:
          path: embeddings
          key: minilm-embeddings-${{ hashFiles('data/precompute-embeddings.py') }}

      - name: Prepare MiniLM semantic assets
        run: |
          bun run download:model
          bun run export:verses
          bun run precompute:embeddings

      - name: Check workspace
        working-directory: src-tauri
        run: cargo check --workspace

      - name: Test workspace
        working-directory: src-tauri
        run: cargo test --workspace

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --workspace --all-targets

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Dependency audit
        working-directory: src-tauri
        run: cargo deny check
