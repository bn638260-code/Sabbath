name: Release Desktop Build

on:
  workflow_dispatch:

jobs:
  windows-release:
    name: Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: bun install

      - name: Download Bible source data
        run: bun run download:bible-data

      - name: Build public Bible DB
        run: bun run build:bible:public

      - name: Import EGW books
        run: bun run build:egw

      - name: Verify public Bible DB
        run: bun run verify:bible:public

      - name: Cache Vosk model
        uses: actions/cache@v4
        with:
          path: |
            models/vosk/vosk-model-small-en-us
            models/vosk/vosk-model-small-en-us-0.15.zip
          key: vosk-model-small-en-us-0.15

      - name: Download Vosk model
        run: bun run download:vosk

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: models/whisper/ggml-tiny.en.bin
          key: whisper-ggml-tiny-en

      - name: Download Whisper model
        run: bun run download:whisper

      - name: Cache MiniLM models
        uses: actions/cache@v4
        with:
          path: |
            models/minilm-l6-v2
            models/minilm-l6-v2-int8
          key: minilm-models-${{ hashFiles('data/export-minilm-onnx.py') }}

      - name: Cache embeddings
        uses: actions/cache@v4
        with:
          path: embeddings
          key: minilm-embeddings-${{ hashFiles('data/precompute-embeddings.py') }}

      - name: Prepare MiniLM semantic assets
        run: |
          bun run download:model
          bun run export:verses
          bun run precompute:embeddings

      - name: npm audit
        run: npm audit --audit-level=moderate

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --workspace --all-targets

      - name: Test workspace
        working-directory: src-tauri
        run: cargo test --workspace

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Dependency audit
        working-directory: src-tauri
        run: cargo deny check

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate SBOM
        working-directory: src-tauri
        run: cargo cyclonedx --all --format json --output-cdx

      - name: Build Tauri installer
        run: bun run tauri build

      - name: Generate checksums
        run: |
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -File |
            ForEach-Object {
              $hash = (Get-FileHash -Path $_.FullName -Algorithm SHA256).Hash
              "$hash  $($_.Name)" | Out-File -FilePath src-tauri/target/release/bundle/SHA256SUMS.txt -Append
            }

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: sabbathcue-windows-bundle
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/cyclonedx/**
