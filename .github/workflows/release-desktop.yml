name: Release Desktop Build

on:
  workflow_dispatch:

jobs:
  windows-release:
    name: Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: bun install

      - name: Download Bible source data
        run: bun run download:bible-data

      - name: Build public Bible DB
        run: bun run build:bible:public

      - name: Verify public Bible DB
        run: bun run verify:bible:public

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: models/whisper/ggml-base.en.bin
          key: whisper-ggml-base-en

      - name: Download Whisper model
        run: bun run download:whisper

      - name: Build Tauri installer
        run: bun run tauri build

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: sabbathcue-windows-bundle
          path: src-tauri/target/release/bundle/**
