name: Release Desktop Build

on:
  workflow_dispatch:

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"

jobs:
  windows-release:
    name: Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify releases repo token
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          $repo = "Bongisto/sabbathcue-releases"
          if ([string]::IsNullOrWhiteSpace($env:GH_TOKEN)) {
            Write-Error "Missing repository secret: RELEASES_REPO_TOKEN"
            exit 1
          }

          $oldNativeCommandPreference = $PSNativeCommandUseErrorActionPreference
          $PSNativeCommandUseErrorActionPreference = $false
          try {
            $repoJson = gh api "repos/$repo" 2>&1 | Out-String
            $repoExitCode = $LASTEXITCODE

            $probeOutput = gh api --method POST "repos/$repo/releases" `
              --raw-field tag_name="" `
              --raw-field name="SabbathCue release token probe" `
              2>&1 | Out-String
            $probeExitCode = $LASTEXITCODE
          } finally {
            $PSNativeCommandUseErrorActionPreference = $oldNativeCommandPreference
          }

          if ($repoExitCode -ne 0) {
            Write-Error "RELEASES_REPO_TOKEN cannot access $repo. Use a token scoped to $repo with Contents: Read and write. GitHub CLI output: $repoJson"
            exit 1
          }

          if ($probeExitCode -eq 0) {
            Write-Error "Release token probe unexpectedly created a release."
            exit 1
          }
          if ($probeOutput -match "HTTP 403|Resource not accessible by personal access token") {
            Write-Error "RELEASES_REPO_TOKEN cannot create releases in $repo. Give the fine-grained PAT Contents: Read and write on $repo, or replace it with a classic PAT with repo/public_repo access. GitHub CLI output: $probeOutput"
            exit 1
          }
          if ($probeOutput -notmatch "HTTP 422|Validation Failed") {
            Write-Error "Release token probe returned an unexpected response. GitHub CLI output: $probeOutput"
            exit 1
          }

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python for Vosk sidecar
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        run: bun install

      - name: Download Bible source data
        run: bun run download:bible-data

      - name: Build public Bible DB
        run: bun run build:bible:public

      - name: Import EGW books
        run: bun run build:egw

      - name: Verify public Bible DB
        run: bun run verify:bible:public

      - name: Cache Vosk model
        uses: actions/cache@v4
        with:
          path: |
            models/vosk/vosk-model-en-us-0.22-lgraph
            models/vosk/vosk-model-en-us-0.22-lgraph.zip
          key: vosk-model-en-us-0.22-lgraph

      - name: Download Vosk model
        run: bun run download:vosk

      - name: Build self-contained Vosk worker
        run: bun run build:vosk-sidecar

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: models/whisper/ggml-tiny.en.bin
          key: whisper-ggml-tiny-en

      - name: Download Whisper model
        run: bun run download:whisper

      - name: Cache MiniLM model
        uses: actions/cache@v4
        with:
          path: |
            models/minilm-l6-v2
            models/minilm-l6-v2-int8
          key: minilm-l6-v2-model-${{ hashFiles('data/download-model.ts', 'data/export-minilm-onnx.py') }}

      - name: Cache embeddings
        uses: actions/cache@v4
        with:
          path: embeddings
          key: minilm-l6-v2-embeddings-${{ hashFiles('data/download-model.ts', 'data/export-minilm-onnx.py') }}

      - name: Prepare MiniLM semantic assets
        run: |
          bun run download:model
          bun run export:verses
          bun run precompute:embeddings

      - name: npm audit
        run: npm audit --audit-level=moderate

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --workspace --all-targets

      - name: Test workspace
        working-directory: src-tauri
        run: cargo test --workspace

      - name: Install cargo-deny
        shell: pwsh
        run: |
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            cargo +stable install cargo-deny --locked
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }

            if ($attempt -eq 3) {
              exit $LASTEXITCODE
            }

            $delaySeconds = 15 * $attempt
            Write-Warning "cargo-deny install failed on attempt $attempt. Retrying in $delaySeconds seconds."
            Start-Sleep -Seconds $delaySeconds
          }

      - name: Dependency audit
        working-directory: src-tauri
        run: cargo deny check

      - name: Install cargo-cyclonedx
        shell: pwsh
        run: |
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            cargo +stable install cargo-cyclonedx --locked
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }

            if ($attempt -eq 3) {
              exit $LASTEXITCODE
            }

            $delaySeconds = 15 * $attempt
            Write-Warning "cargo-cyclonedx install failed on attempt $attempt. Retrying in $delaySeconds seconds."
            Start-Sleep -Seconds $delaySeconds
          }

      - name: Generate SBOM
        working-directory: src-tauri
        continue-on-error: true
        run: cargo cyclonedx --all --format json

      - name: Verify Supabase build env
        shell: pwsh
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:VITE_SUPABASE_URL)) {
            Write-Error "Missing repository secret: VITE_SUPABASE_URL"
            exit 1
          }
          if ([string]::IsNullOrWhiteSpace($env:VITE_SUPABASE_ANON_KEY)) {
            Write-Error "Missing repository secret: VITE_SUPABASE_ANON_KEY"
            exit 1
          }

      - name: Build Tauri installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: bun run tauri:build:release

      - name: Generate latest.json for updater
        shell: pwsh
        run: |
          $bundleRoot = "src-tauri/target/release/bundle"
          $nsisDir = Join-Path $bundleRoot "nsis"
          if (-not (Test-Path $nsisDir)) {
            Write-Error "NSIS bundle directory not found at $nsisDir"
            exit 1
          }

          $setupExe = Get-ChildItem -Path $nsisDir -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $setupExe) {
            Write-Error "NSIS setup.exe not found under $nsisDir"
            exit 1
          }

          $sigPath = "$($setupExe.FullName).sig"
          if (-not (Test-Path $sigPath)) {
            Write-Error "Signature file missing: $sigPath"
            exit 1
          }

          $conf = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $version = $conf.version
          if (-not $version) {
            Write-Error "Could not read version from tauri.conf.json"
            exit 1
          }

          $tag = "v$version"
          $assetName = $setupExe.Name
          $downloadUrl = "https://github.com/Bongisto/sabbathcue-releases/releases/download/$tag/$assetName"
          $signature = (Get-Content $sigPath -Raw).Trim()

          $latest = [ordered]@{
            version = $version
            notes = "SabbathCue $version"
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                url = $downloadUrl
                signature = $signature
              }
            }
          }

          $latestPath = Join-Path $bundleRoot "latest.json"
          $latest | ConvertTo-Json -Depth 6 | Set-Content -Path $latestPath -Encoding utf8
          Write-Host "Wrote $latestPath for $assetName"

      - name: Verify updater artifacts
        shell: pwsh
        run: |
          $bundleRoot = "src-tauri/target/release/bundle"
          $latestPath = Join-Path $bundleRoot "latest.json"
          if (-not (Test-Path $latestPath)) {
            Write-Error "latest.json missing"
            exit 1
          }

          $sigFiles = Get-ChildItem -Path $bundleRoot -Recurse -Filter "*.sig"
          if ($sigFiles.Count -eq 0) {
            Write-Error "No .sig files found under $bundleRoot"
            exit 1
          }

          Write-Host "Found $($sigFiles.Count) signature file(s) and latest.json"

      - name: Generate checksums
        run: |
          function Get-Sha256Hex {
            param([string]$Path)

            $stream = [System.IO.File]::OpenRead($Path)
            try {
              $sha256 = [System.Security.Cryptography.SHA256]::Create()
              try {
                return ([System.BitConverter]::ToString($sha256.ComputeHash($stream)) -replace "-", "").ToLowerInvariant()
              } finally {
                $sha256.Dispose()
              }
            } finally {
              $stream.Dispose()
            }
          }

          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -File |
            ForEach-Object {
              $hash = Get-Sha256Hex $_.FullName
              "$hash  $($_.Name)" | Out-File -FilePath src-tauri/target/release/bundle/SHA256SUMS.txt -Append
            }

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: sabbathcue-windows-bundle
          path: |
            src-tauri/target/release/bundle/**

      - name: Publish GitHub Release (sabbathcue-releases)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          $bundleRoot = "src-tauri/target/release/bundle"
          $conf = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $version = $conf.version
          $tag = "v$version"

          $assets = @()
          $assets += Get-ChildItem -Path (Join-Path $bundleRoot "nsis") -File -ErrorAction SilentlyContinue
          $assets += Get-ChildItem -Path (Join-Path $bundleRoot "msi") -File -ErrorAction SilentlyContinue
          $assets += Get-Item (Join-Path $bundleRoot "latest.json")
          $assets += Get-Item (Join-Path $bundleRoot "SHA256SUMS.txt")

          # nsis/msi folders already include .sig files; dedupe by filename for safety
          $assetArgs = $assets | Sort-Object Name -Unique | ForEach-Object { $_.FullName }
          Write-Host "Publishing $($assetArgs.Count) release assets"

          $repo = "Bongisto/sabbathcue-releases"
          $releaseExists = $false
          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            $releaseExists = $true
          }

          if ($releaseExists) {
            Write-Host "Release $tag already exists; uploading assets with --clobber"
            gh release upload $tag --repo $repo --clobber @assetArgs
            exit $LASTEXITCODE
          }

          gh release create $tag `
            --repo $repo `
            --title "SabbathCue $version" `
            --notes "Windows installers for SabbathCue $version. Auto-update is supported via the NSIS .exe (recommended). MSI is provided as an alternate installer." `
            @assetArgs
